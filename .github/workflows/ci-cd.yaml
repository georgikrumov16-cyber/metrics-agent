name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: sudo apt update && sudo apt install -y g++ make

    - name: Build C++ metrics agent
      run: |
        g++ src/main.cpp -o metrics-agent -Iinclude -pthread

    - name: Build Docker image
      run: docker build -t metrics-agent:latest .

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag image
      run: docker tag metrics-agent:latest ghcr.io/${{ github.repository_owner }}/metrics-agent:latest

    - name: Push image
      run: docker push ghcr.io/${{ github.repository_owner }}/metrics-agent:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

    - name: Update Deployment image
      run: |
        kubectl set image deployment/metrics-agent metrics-agent=ghcr.io/${{ github.repository_owner }}/metrics-agent:latest

    - name: Verify rollout
      run: kubectl rollout status deployment/metrics-agent

